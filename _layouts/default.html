<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}Byte Sanctuary</title>
  <link rel="stylesheet" href="{{ '/assets/css/garden.css' | relative_url }}">
  <script defer src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@400;700&family=Fira+Code&display=swap">
</head>
<body>
  <header class="site-header">
    <div class="site-header-row">
      <img src="/assets/img/byte-logo.png" alt="Byte Sanctuary Logo" class="site-logo">
      <div class="site-title">Byte Sanctuary</div>
      <span class="site-header-spacer"></span>
      <button class="theme-toggle" aria-label="Toggle dark/light mode" aria-pressed="false" title="Toggle dark/light mode"></button>
    </div>
    <hr class="divider">
    <nav class="nav-bar">
      <a href="/" class="nav-link">Home</a>
      <a href="/about/" class="nav-link">About</a>
    </nav>
    <hr class="divider">
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <div class="footer-links">
      <a href="https://github.com/adityac4" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/adityac4" target="_blank">LinkedIn</a>
      <a href="mailto:your@email.com">Email</a>
    </div>
  </footer>
</body>
</html>
