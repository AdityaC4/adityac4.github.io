---
layout: default
title: "{{ page.title }}"
---
<div class="wrapper">
  {% if page.image %}
    <img class="post-hero-img" src="{{ page.image }}" alt="{{ page.title }}">
  {% else %}
    <img class="post-hero-img" src="/assets/img/fallback.jpg" alt="{{ page.title }}">
  {% endif %}
  <div class="post-content">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%b %d, %Y" }}</div>
    {{ content }}
  </div>
</div>
